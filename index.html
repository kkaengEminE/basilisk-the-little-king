<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>BASILISK: The Little King</title>
    <style>
      :root {
        --parchment: #d9c39a;
        --ink: #2a1c0f;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1208;
        font-family: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
        image-rendering: auto;
      }
      /* Loading hint shown before the bundle boots. */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--parchment);
        font-size: 1.2rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="boot">Awakening the little king&hellip;</div>
    <canvas id="game"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
